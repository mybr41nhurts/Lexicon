<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lexicon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #111111; --muted: #666666; --accent: #007AFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-top: env(safe-area-inset-top); }
        .container { padding: 40px 24px; max-width: 400px; margin: 0 auto; }
        header { margin-bottom: 60px; display: flex; justify-content: space-between; align-items: baseline; }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; }
        .date { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
        .card { min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
        .pos { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
        .word { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1; margin-bottom: 12px; }
        .phonetic { font-style: italic; color: var(--muted); margin-bottom: 32px; font-size: 18px; }
        .definition { font-size: 20px; line-height: 1.5; margin-bottom: 24px; font-weight: 400; }
        .example { color: var(--muted); font-style: italic; font-size: 16px; border-left: 2px solid #eee; padding-left: 16px; }
        .tab-bar { position: fixed; bottom: 40px; left: 24px; right: 24px; display: flex; gap: 12px; }
        .btn { flex: 1; background: #111; color: white; border: none; padding: 18px; border-radius: 16px; font-size: 15px; font-weight: 600; transition: 0.2s; }
        .btn-secondary { background: #f2f2f7; color: #111; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Lexicon.</div>
            <div class="date" id="date">OCT 24</div>
        </header>
        <div class="card" id="card">
            <span class="pos" id="w-pos">Adjective</span>
            <h1 class="word" id="w-name">Sonder</h1>
            <p class="phonetic" id="w-phonetic">/ˈsɔːn.dər/</p>
            <p class="definition" id="w-def">The realization that each random passerby is living a life as vivid and complex as your own.</p>
            <p class="example" id="w-ex">"He felt a wave of sonder while watching the commuters at the station."</p>
        </div>
        <div class="tab-bar">
            <button class="btn btn-secondary" onclick="share()">Share</button>
            <button class="btn" onclick="next()">New Word</button>
        </div>
    </div>
    <script>
        const words = [
            {w:"Sonder", p:"noun", ph:"/ˈsɔːn.dər/", d:"The realization that everyone has a story as complex as yours.", e:"He felt a wave of sonder at the station."},
            {w:"Vellichor", p:"noun", ph:"/ˈvel-ɪ-kɔːr/", d:"The strange wistfulness of used bookstores.", e:"The shop was filled with a sense of vellichor."},
            {w:"Ebullient", p:"adj", ph:"/ɪˈbʊl.i.ənt/", d:"Cheerful and full of energy.", e:"She arrived in an ebullient mood."},
            {w:"Limerence", p:"noun", ph:"/ˈlɪm.ər.əns/", d:"The state of being infatuated with another person.", e:"His crush was a textbook case of limerence."}
        ];
        function next() {
            const item = words[Math.floor(Math.random()*words.length)];
            document.getElementById('w-name').innerText = item.w;
            document.getElementById('w-pos').innerText = item.p;
            document.getElementById('w-phonetic').innerText = item.ph;
            document.getElementById('w-def').innerText = item.d;
            document.getElementById('w-ex').innerText = `"${item.e}"`;
        }
        function share() {
            const text = `${document.getElementById('w-name').innerText}: ${document.getElementById('w-def').innerText}`;
            if(navigator.share) navigator.share({title: 'Lexicon', text: text, url: window.location.href});
        }
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'}).toUpperCase();
    </script>
</body>
</html>
